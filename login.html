<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | East Point College of Engineering</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <div>
        <span class="campus-tag">East Point College of Engineering</span>
        <h1>Student Login</h1>
        <p>Sign in to access attendance, hostel, mess, library, and dashboard features.</p>
      </div>
    </header>

    <section class="page-card">
      <form id="login-form" class="login-form" action="https://student-college-app-backend.onrender.com/login" method="POST">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="you@student.edu" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password" required />

        <button class="button primary" type="submit">Login</button>
      </form>

      <div class="login-actions">
        <a class="button secondary" href="https://student-college-app-backend.onrender.com/signup" id="signup-button">Create account</a>
        <a class="link-back" href="https://student-college-app.vercel.app">Back to home</a>
      </div>
    </section>
  </main>
</body>
</html>
