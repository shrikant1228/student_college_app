<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>East Point College of Engineering</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="landing">
    <section class="landing-panel">
      <div class="landing-copy">
        <span class="campus-tag">East Point College of Engineering</span>
        <h1>College Student Portal</h1>
        <p>Access attendance, hostel, mess, library, and dashboard tools from a modern campus interface.</p>
        <div class="landing-actions">
          <a class="button primary" id="login-button" href="https://student-college-app-backend.onrender.com/login">Login</a>
          <a class="button secondary" id="signup-button" href="https://student-college-app-backend.onrender.com/signup">Sign Up</a>
        </div>
      </div>

      <div class="hero-3d">
        <div class="scene">
          <div class="hero-card hero-front"><span>Campus Hub</span></div>
          <div class="hero-card hero-left"><span>Attendance</span></div>
          <div class="hero-card hero-right"><span>Library</span></div>
          <div class="hero-card hero-back"><span>Hostel</span></div>
          <div class="hero-card hero-top"><span>Mess</span></div>
        </div>
      </div>
    </section>

    <section class="portal-section">
      <h2>Quick access links</h2>
      <div class="portal-grid">
        <a class="portal-card" href="dashboard.html">Dashboard</a>
        <a class="portal-card" href="attendance.html">Attendance</a>
        <a class="portal-card" href="hostel.html">Hostel</a>
        <a class="portal-card" href="mess.html">Mess</a>
        <a class="portal-card" href="library.html">Library</a>
      </div>
    </section>
  </main>
</body>
</html>
